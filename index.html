<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ủng hộ Văn Ngân</title>
  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #1a1a1a, #333);
      color: white;
      padding: 0;
      margin: 0;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    .banner {
      background: linear-gradient(90deg, #ffd700, #ff9800);
      color: #000;
      padding: 20px;
      font-size: 1.5em;
      font-weight: bold;
    }

    .dashboard {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin: 20px;
    }

    .card {
      background: #111;
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 20px;
      min-width: 150px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #000;
      color: #ffd700;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: black;
      padding: 20px;
      display: none;
    }
  </style>
</head>

<body>

<div class="banner">Ủng hộ Văn Ngân</div>

<div class="dashboard">
  <div class="card"><h3>💰 Tổng</h3><p id="totalAmount">0</p></div>
  <div class="card"><h3>👥 Lượt</h3><p id="totalCount">0</p></div>
  <div class="card"><h3>🥇 Top</h3><p id="topDonor">---</p></div>
</div>

<button onclick="showQR(100000,'Ung ho')">Ủng hộ 100K</button>

<div id="popup" class="popup">
  <img id="qrImage" width="200"><br>
  <button onclick="downloadQR()">Tải QR</button>
</div>

<div id="toast" class="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzc8CodccOwXDNEnOs2ChMqvbU-TbX1DKcF0ayOCLBRhrRBQl0Ag0kawxDd1gB1V2gY/exec";
let lastCount = 0;

function showQR(amount, info) {
  let qrLink = `https://img.vietqr.io/image/VietinBank-101601626628-compact2.jpg?amount=${amount}&addInfo=${info}&accountName=VAN NGAN`;
  document.getElementById("qrImage").src = qrLink;
  document.getElementById("popup").style.display = "block";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({amount, info})
  });

  showToast({amount, info});
}

function downloadQR() {
  let img = document.getElementById("qrImage").src;
  fetch(img).then(r=>r.blob()).then(blob=>{
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="qr.png";
    a.click();
  });
}

function loadDashboard() {
  fetch(API_URL).then(r=>r.json()).then(data=>{
    let total = data.reduce((s,i)=>s+Number(i.amount||0),0);
    document.getElementById("totalAmount").innerText = total.toLocaleString()+" VND";
    document.getElementById("totalCount").innerText = data.length;

    let top = data.sort((a,b)=>b.amount-a.amount)[0];
    if(top) document.getElementById("topDonor").innerText = top.info+" ("+top.amount+")";

    if(data.length>lastCount) showToast(data[data.length-1]);
    lastCount = data.length;
  });
}

function showToast(item) {
  let t=document.getElementById("toast");
  t.innerText = item.info+" vừa ủng hộ "+item.amount;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

loadDashboard();
setInterval(loadDashboard,10000);
</script>

</body>
</html>
