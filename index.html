<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ủng hộ Văn Ngân</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: url('hinh-nen.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      padding: 5%;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }
    img.avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #ffd700;
      box-shadow: 0 0 15px #000;
      margin-bottom: 15px;
    }
    .intro {
      font-size: 1.3em;
      color: #ffd700;
      text-shadow: 1px 1px 3px #000;
      margin-bottom: 25px;
    }
    h2 {
      color: #ffd700;
      text-shadow: 2px 2px 4px #000;
      font-size: 2.5em;
    }
    p {
      font-size: 1.2em;
    }
    .donate-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 800px;
      margin: 0 auto;
    }
    .donate-buttons button {
      margin: 10px;
      padding: 20px 30px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: rgba(255, 64, 129, 0.9);
      color: white;
      box-shadow: 2px 2px 6px #000;
      flex: 1 1 40%;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: pulse 2s infinite;
    }
    .donate-buttons button:hover {
      background: rgba(233, 30, 99, 0.9);
      transform: scale(1.05);
      box-shadow: 0 0 15px #ff80ab;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #qrBox {
      margin-top: 30px;
      display: none;
    }
    #qrBox img {
      width: 250px;
      border: 3px solid #ffd700;
      border-radius: 12px;
      box-shadow: 0 0 15px #000;
    }
    footer {
      margin-top: 50px;
      font-size: 1em;
      color: #ffd700;
      text-shadow: 1px 1px 3px #000;
    }
    @media (max-width: 600px) {
      h2 { font-size: 2em; }
      .donate-buttons button {
        font-size: 1em;
        padding: 15px 20px;
        flex: 1 1 100%;
      }
      img.avatar { width: 120px; height: 120px; }
      .intro { font-size: 1.1em; }
      footer { font-size: 0.9em; }
    }
  </style>
</head>
<body>
  <img src="ca-nhan.JPG" alt="Ảnh cá nhân" class="avatar">
  <div class="intro">Xin chào, tôi là Văn Ngân</div>

  <h2>Ủng hộ tôi qua chuyển khoản ngân hàng</h2>
  <p>Chọn số tiền bạn muốn donate:</p>

  <div class="donate-buttons">
    <button onclick="showQR(10000)">10,000 VND</button>
    <button onclick="showQR(20000)">20,000 VND</button>
    <button onclick="showQR(50000)">50,000 VND</button>
    <button onclick="showQR(100000)">100,000 VND</button>
    <button onclick="showQR(150000)">150,000 VND</button>
    <button onclick="showQR(200000)">200,000 VND</button>
    <button onclick="showQR(300000)">300,000 VND</button>
    <button onclick="showQR(400000)">400,000 VND</button>
    <button onclick="showQR(500000)">500,000 VND</button>
  </div>

  <!-- Khung hiển thị QR -->
  <div id="qrBox">
    <p>Quét mã QR bằng ứng dụng ngân hàng của bạn:</p>
    <img id="qrImage" src="" alt="QR Code">
  </div>

  <footer>
    © 2026 Văn Ngân – Cảm ơn sự ủng hộ của bạn
  </footer>

  <script>
    function showQR(amount) {
      // Tài khoản ngân hàng của bạn
      let bankAccount = "101601626628";
      let bankName = "VietinBank";
      let accountName = "VAN NGAN";

      // Nội dung chuyển khoản không dấu
      let addInfo = "Ung%20ho%20Cafe";

      // Link QR động từ VietQR
      let qrLink = `https://img.vietqr.io/image/${bankName}-${bankAccount}-compact2.jpg?amount=${amount}&addInfo=${addInfo}&accountName=${accountName}`;

      document.getElementById("qrImage").src = qrLink;
      document.getElementById("qrBox").style.display = "block";
    }
  </script>
</body>
</html>
