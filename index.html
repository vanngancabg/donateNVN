<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ủng hộ Văn Ngân</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: url('hinh-nen.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      padding: 5%;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }
    img.avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #ffd700;
      box-shadow: 0 0 15px #000;
      margin-bottom: 15px;
    }
    .intro {
      font-size: 1.3em;
      color: #ffd700;
      text-shadow: 1px 1px 3px #000;
      margin-bottom: 25px;
    }
    h2 {
      color: #ffd700;
      text-shadow: 2px 2px 4px #000;
      font-size: 2.5em;
    }
    p {
      font-size: 1.2em;
    }
    .donate-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 800px;
      margin: 0 auto;
    }
    .donate-buttons button {
      margin: 10px;
      padding: 20px 30px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: rgba(255, 64, 129, 0.9);
      color: white;
      box-shadow: 2px 2px 6px #000;
      flex: 1 1 40%;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: pulse 2s infinite;
    }
    .donate-buttons button:hover {
      background: rgba(233, 30, 99, 0.9);
      transform: scale(1.05);
      box-shadow: 0 0 15px #ff80ab;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #qrBox {
      margin-top: 30px;
      display: none;
    }
    #qrBox img {
      width: 250px;
      border: 3px solid #ffd700;
      border-radius: 12px;
      box-shadow: 0 0 15px #000;
      margin-bottom: 15px;
    }
    #saveBtn {
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #ffd700;
      color: #000;
      box-shadow: 2px 2px 6px #000;
    }
    #saveBtn:hover {
      background: #ffeb3b;
    }
    .custom-amount {
      margin-top: 20px;
    }
    .custom-amount input {
      padding: 10px;
      font-size: 1em;
      border-radius: 8px;
      border: none;
      width: 200px;
      text-align: center;
      margin: 5px;
    }
    .custom-amount button {
      margin-left: 10px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4caf50;
      color: white;
      box-shadow: 2px 2px 6px #000;
    }
    .custom-amount button:hover {
      background: #45a049;
    }
    footer {
      margin-top: 50px;
      font-size: 1em;
      color: #ffd700;
      text-shadow: 1px 1px 3px #000;
    }
    @media (max-width: 600px) {
      h2 { font-size: 2em; }
      .donate-buttons button {
        font-size: 1em;
        padding: 15px 20px;
        flex: 1 1 100%;
      }
      img.avatar { width: 120px; height: 120px; }
      .intro { font-size: 1.1em; }
      footer { font-size: 0.9em; }
    }
  </style>
</head>
<body>
  <img src="ca-nhan.jpg" alt="Ảnh cá nhân" class="avatar">
  <div class="intro">Xin chào, tôi là Văn Ngân</div>

  <h2>Ủng hộ tôi qua chuyển khoản ngân hàng</h2>
  <p>Chọn số tiền bạn muốn donate:</p>

  <div class="donate-buttons">
    <button onclick="showQR(10000, 'Ung ho Cafe')">10,000 VND</button>
    <button onclick="showQR(20000, 'Ung ho Cafe')">20,000 VND</button>
    <button onclick="showQR(50000, 'Ung ho Cafe')">50,000 VND</button>
    <button onclick="showQR(100000, 'Ung ho Cafe')">100,000 VND</button>
    <button onclick="showQR(150000, 'Ung ho Cafe')">150,000 VND</button>
    <button onclick="showQR(200000, 'Ung ho Cafe')">200,000 VND</button>
    <button onclick="showQR(300000, 'Ung ho Cafe')">300,000 VND</button>
    <button onclick="showQR(400000, 'Ung ho Cafe')">400,000 VND</button>
    <button onclick="showQR(500000, 'Ung ho Cafe')">500,000 VND</button>
  </div>

  <!-- Ô nhập số tiền và nội dung tùy chọn -->
  <div class="custom-amount">
    <input type="number" id="customAmount" placeholder="Nhập số tiền (VND)">
    <input type="text" id="customInfo" placeholder="Nội dung chuyển khoản (không dấu)">
    <button onclick="customDonate()">Tạo QR</button>
  </div>

  <!-- Khung hiển thị QR -->
  <div id="qrBox">
    <p>Quét mã QR bằng ứng dụng ngân hàng của bạn:</p>
    <img id="qrImage" src="" alt="QR Code">
    <br>
    <a id="qrDownload" href="" download="qr-chuyenkhoan.jpg">
      <button id="saveBtn">Lưu ảnh mã QR</button>
    </a>
  </div>

  <footer>
    © 2026 Văn Ngân – Cảm ơn sự ủng hộ của bạn
  </footer>

  <script>
    function showQR(amount, info) {
      let bankAccount = "101601626628";
      let bankName = "VietinBank";
      let accountName = "VAN NGAN";

      // Encode nội dung để đưa vào URL
      let addInfo = encodeURIComponent(info);

      let qrLink = `https://img.vietqr.io/image/${bankName}-${bankAccount}-compact2.jpg?amount=${amount}&addInfo=${addInfo}&accountName=${accountName}`;

      document.getElementById("qrImage").src = qrLink;
      document.getElementById("qrDownload").href = qrLink;
      document.getElementById("qrBox").style.display = "block";
    }

    function customDonate() {
      let amount = document.getElementById("customAmount").value;
      let info = document.getElementById("customInfo").value || "Ung ho Van Ngan";
      if (amount && amount > 0) {
        showQR(amount, info);
      } else {
        alert("Vui lòng nhập số tiền hợp lệ!");
      }
    }
  </script>
</body>
</html>
