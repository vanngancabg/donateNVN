<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ủng hộ tôi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: url('hinh-nen.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      padding: 50px;
    }
    h2 {
      color: #ffd700;
      text-shadow: 2px 2px 4px #000;
    }
    .donate-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
      margin: 0 auto;
    }
    .donate-buttons button {
      margin: 10px;
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: rgba(255, 64, 129, 0.9);
      color: white;
      box-shadow: 2px 2px 6px #000;
      flex: 1 1 40%;
    }
    .donate-buttons button:hover {
      background: rgba(233, 30, 99, 0.9);
    }
  </style>
</head>
<body>
  <h2>Ủng hộ tôi qua Momo</h2>
  <p>Chọn số tiền bạn muốn donate:</p>

  <div class="donate-buttons">
    <button onclick="donate(10000)">10,000 VND</button>
    <button onclick="donate(20000)">20,000 VND</button>
    <button onclick="donate(50000)">50,000 VND</button>
    <button onclick="donate(100000)">100,000 VND</button>
    <button onclick="donate(150000)">150,000 VND</button>
    <button onclick="donate(200000)">200,000 VND</button>
    <button onclick="donate(300000)">300,000 VND</button>
    <button onclick="donate(400000)">400,000 VND</button>
    <button onclick="donate(500000)">500,000 VND</button>
  </div>

  <script>
    function donate(amount) {
      // Thay số điện thoại Momo của bạn vào đây
      let momoLink = `https://nhantien.momo.vn/so_dien_thoai_cua_ban?amount=${amount}`;
      window.location.href = momoLink;
    }
  </script>
</body>
</html>
